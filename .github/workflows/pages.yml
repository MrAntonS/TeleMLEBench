name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to enable Pages and publish to it via the built-in GITHUB_TOKEN.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site files
        run: |
          mkdir -p dist
          cp index.html app.js data.js TeleMLEBench.standalone.html dist/
          touch dist/.nojekyll

      - name: Configure Pages (enables Pages on first run)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
