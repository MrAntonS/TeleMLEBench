<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TeleMLEBench — verified telecom-ML baselines</title>
<meta name="description" content="A searchable catalog of telecom-ML benchmarks where each leaderboard shows not just what a paper claims, but what was independently reproduced.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;color:#14161a;background:#ffffff;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  a{color:inherit;}
  button{font-family:inherit;}
  input::placeholder,textarea::placeholder{color:#9aa0ab;}
  ::selection{background:#dbe6ff;}

  @keyframes tmlFade{from{opacity:0}to{opacity:1}}
  @keyframes tmlSlide{from{transform:translateX(28px);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes tmlPop{from{transform:translateY(10px) scale(.985);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}

  /* utilities */
  .mono{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;}
  .tml-clamp2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .tml-cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px;}
  .tml-splitgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
  .tml-grid1{display:grid;gap:1px;background:#ececef;border:1px solid #ececef;border-radius:13px;overflow:hidden;}
  .tml-metastrip{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));}
  .tml-featstrip{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));}

  /* benchmark / dataset cards */
  .tml-card{cursor:pointer;border:1px solid #e9eaee;border-radius:14px;padding:22px 22px 20px;background:#fff;transition:border-color .15s,box-shadow .15s,transform .15s;}
  .tml-card:hover{border-color:#c9d6f5;box-shadow:0 6px 22px rgba(20,22,26,0.07);transform:translateY(-2px);}

  /* leaderboard rows */
  .tml-row-ai{transition:background .12s;}
  .tml-row-ai:hover{background:#f7faff !important;}

  /* download buttons in split cards */
  .tml-dl{margin-top:auto;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;border:1px solid #e3e5e9;border-radius:9px;padding:10px;font-size:13.5px;font-weight:600;color:#14161a;transition:border-color .15s,background .15s,color .15s;}
  .tml-dl:hover{border-color:#c9d6f5;background:#f7faff;color:#2563eb;}

  /* small icon links inside the table */
  .tml-iconlink{color:#6b7280;display:inline-flex;transition:color .12s;}
  .tml-iconlink:hover{color:#2563eb;}

  /* link rows in the reproduction panel */
  .tml-linkrow{display:flex;align-items:center;justify-content:space-between;text-decoration:none;border:1px solid #e3e5e9;border-radius:10px;padding:13px 15px;font-size:14px;font-weight:500;color:#14161a;transition:border-color .15s,background .15s;}
  .tml-linkrow:hover{border-color:#c9d6f5;background:#f7faff;}

  /* upload dropzone */
  .tml-dz{border:1.5px dashed #cfd3da;border-radius:12px;padding:24px;text-align:center;background:#fafbfc;cursor:pointer;transition:border-color .15s,background .15s;}
  .tml-dz:hover{border-color:#2563eb;background:#f7faff;}

  /* dispute trigger */
  .tml-disputebtn{margin-top:18px;width:100%;background:#fff;border:1.5px solid #e3e5e9;border-radius:10px;padding:13px;font-size:14px;font-weight:600;color:#5b616e;cursor:pointer;transition:border-color .15s,color .15s;}
  .tml-disputebtn:hover{border-color:#c9d6f5;color:#2563eb;}

  /* textarea */
  .tml-textarea{width:100%;min-height:96px;resize:vertical;border:1.5px solid #e3e5e9;border-radius:10px;padding:12px;font-size:14px;font-family:inherit;outline:none;transition:border-color .12s;}
  .tml-textarea:focus{border-color:#2563eb;}

  /* primary / dark buttons — subtle press + hover feedback */
  .tml-primary{transition:filter .12s;}
  .tml-primary:hover{filter:brightness(1.08);}
  .tml-primary:active{filter:brightness(0.94);}
  .tml-dark{transition:filter .15s;}
  .tml-dark:hover{filter:brightness(1.7);}

  /* floating submit FAB — collapses to a circle, expands on hover */
  .tml-fab{display:flex;align-items:center;height:52px;border:none;border-radius:999px;background:#2563eb;color:#fff;cursor:pointer;box-shadow:0 8px 24px rgba(37,99,235,0.38);overflow:hidden;width:52px;justify-content:center;padding:0;transition:width .22s cubic-bezier(.2,.7,.3,1),padding .22s cubic-bezier(.2,.7,.3,1),gap .22s cubic-bezier(.2,.7,.3,1);}
  .tml-fab:hover{width:122px;justify-content:flex-start;gap:9px;padding:0 22px 0 17px;}
  .tml-fab .tml-fab-ico{flex:none;display:flex;align-items:center;justify-content:center;width:18px;height:18px;}
  .tml-fab .tml-fab-label{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;max-width:0;opacity:0;transition:max-width .22s ease,opacity .18s ease;}
  .tml-fab:hover .tml-fab-label{max-width:90px;opacity:1;}

  /* loading spinner (API fetch states) */
  @keyframes tmlSpin{to{transform:rotate(360deg)}}
  .tml-spinner{display:inline-block;width:20px;height:20px;border:2.5px solid #e3e5e9;border-top-color:#2563eb;border-radius:50%;animation:tmlSpin .7s linear infinite;vertical-align:middle;}

  /* reproduction-in-progress pulse (dataset cards + leaderboard rows) */
  @keyframes tmlPulse{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.35);border-color:#2563eb;}50%{box-shadow:0 0 0 8px rgba(37,99,235,0);border-color:#93b4f8;}}
  .tml-running{animation:tmlPulse 1.6s ease-in-out infinite;border-color:#2563eb !important;}
  @keyframes tmlPulseRow{0%,100%{background-color:#e8f0fe;}50%{background-color:#f8faff;}}
  .tml-running-row{animation:tmlPulseRow 1.6s ease-in-out infinite;box-shadow:inset 3px 0 0 #2563eb;}
  .tml-spinner-xs{display:inline-block;width:10px;height:10px;border:2px solid #b9ccf7;border-top-color:#2563eb;border-radius:50%;animation:tmlSpin .7s linear infinite;vertical-align:-1px;margin-right:5px;}

  @media (max-width:640px){
    .tml-hero{font-size:36px !important;}
  }
  @media (max-width:980px){
    .tml-rungrid{grid-template-columns:minmax(0,1fr) !important;}
  }
</style>
</head>
<body>
<div id="app"></div>

<!-- ───────────────────────── TeleMLEBench API configuration ─────────────────────────
     The app loads all data live from the TeleMLEBench REST API (base path /api/v1).
     Set the base URL of your running API below. The default talks to a local
       uvicorn api:app --port 8080
     Replace it with your deployed API when ready, e.g.
       window.TMLB_API_BASE = "https://api.your-host.example/api/v1";
     You can also override it per page-load with ?api=<url> in the address bar.
     Note: an https:// page cannot call http://localhost (mixed content) — when this
     site is served over https, point TMLB_API_BASE at an https API. -->
<script>
  window.TMLB_API_BASE = "http://localhost:8080/api/v1";
</script>
<script src="./app.js?v=18"></script>
</body>
</html>
